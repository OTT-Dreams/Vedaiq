<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vedaiq — Intelligence Engineered</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070910;
    --bg2: #0c0f1a;
    --gold: #c8932a;
    --gold2: #f0c060;
    --gold-glow: rgba(200,147,42,0.18);
    --text: #e8e4d8;
    --muted: #7a7670;
    --card: rgba(20,24,44,0.85);
    --border: rgba(200,147,42,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  @media (hover: hover) { body { cursor: none; } }
  @media (hover: none) { .cursor, .cursor-ring { display: none !important; } }

  .cursor {
    position: fixed; width: 10px; height: 10px;
    background: var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s; mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed; width: 36px; height: 36px;
    border: 1.5px solid var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, opacity 0.2s; opacity: 0.5;
  }

  /* Noise overlay */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1; opacity: 0.5;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 5%;
    backdrop-filter: blur(18px);
    background: rgba(7,9,16,0.88);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
    letter-spacing: -0.02em; color: var(--text); text-decoration: none;
  }
  .logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 2.2rem; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.82rem;
    font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta {
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    padding: 0.5rem 1.2rem; border-radius: 2px; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: background 0.2s, color 0.2s;
  }
  .nav-cta:hover { background: var(--gold); color: var(--bg); }

  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 4px; background: none; border: none;
  }
  .hamburger span {
    display: block; width: 24px; height: 2px;
    background: var(--gold); border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none; position: fixed;
    top: 62px; left: 0; right: 0;
    background: rgba(7,9,16,0.97);
    border-bottom: 1px solid var(--border);
    z-index: 150; padding: 1.5rem 6%;
    flex-direction: column; gap: 0;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: var(--muted); text-decoration: none; font-size: 0.95rem;
    font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 1rem 0; border-bottom: 1px solid var(--border);
    transition: color 0.2s;
  }
  .mobile-menu a:hover { color: var(--gold); }
  .mobile-menu .m-cta {
    margin-top: 1rem; background: var(--gold); color: var(--bg);
    border: none; padding: 0.9rem; text-align: center; font-weight: 600;
    border-radius: 2px; font-size: 0.9rem; letter-spacing: 0.05em;
    text-transform: uppercase; cursor: pointer; text-decoration: none;
    display: block;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 7rem 8% 5rem;
    position: relative; overflow: hidden;
  }

  /* Gold grid background */
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,147,42,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,147,42,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    pointer-events: none;
  }

  /* Floating orbs */
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(100px); pointer-events: none;
    animation: orb-float 8s ease-in-out infinite;
  }
  .orb1 { width: 500px; height: 500px; background: rgba(200,147,42,0.07); top: -80px; right: -80px; animation-delay: 0s; }
  .orb2 { width: 350px; height: 350px; background: rgba(26,31,58,0.9); bottom: 0; left: -80px; animation-delay: 3s; }
  .orb3 { width: 280px; height: 280px; background: rgba(200,147,42,0.04); top: 50%; left: 30%; animation-delay: 5s; }

  @keyframes orb-float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.04); }
  }

  /* Spinning ring */
  .hero-ring {
    position: absolute; right: 7%; top: 50%;
    transform: translateY(-50%);
    width: 380px; height: 380px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    animation: ring-spin 20s linear infinite; opacity: 0.5;
  }
  .hero-ring::before {
    content: ''; position: absolute; inset: 30px; border-radius: 50%;
    border: 1px dashed rgba(200,147,42,0.2);
    animation: ring-spin 15s linear infinite reverse;
  }
  .hero-ring::after {
    content: ''; position: absolute; inset: 80px; border-radius: 50%;
    border: 1px solid rgba(200,147,42,0.15);
  }
  @keyframes ring-spin {
    from { transform: translateY(-50%) rotate(0deg); }
    to   { transform: translateY(-50%) rotate(360deg); }
  }

  .hero-dot {
    width: 6px; height: 6px; background: var(--gold); border-radius: 50%;
    position: absolute; top: 50%; left: 50%; margin: -3px;
    box-shadow: 0 0 12px var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px var(--gold); transform: scale(1); }
    50% { box-shadow: 0 0 28px var(--gold2); transform: scale(1.4); }
  }

  /* Hero badge */
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(200,147,42,0.08); border: 1px solid var(--border);
    padding: 0.3rem 0.85rem; border-radius: 2px;
    font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--gold);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 1.5rem; opacity: 0;
    animation: fade-up 0.8s ease forwards 0.2s;
  }
  .badge-dot {
    width: 6px; height: 6px; background: var(--gold); border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(2.4rem, 6.5vw, 5.8rem);
    line-height: 1.05; letter-spacing: -0.03em; max-width: 660px;
    opacity: 0; animation: fade-up 0.9s ease forwards 0.4s;
  }
  .gold-line {
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; display: block;
  }
  .hero-sub {
    margin-top: 1.4rem;
    font-size: clamp(0.88rem, 2vw, 1rem);
    color: var(--muted); max-width: 440px;
    line-height: 1.75; font-weight: 300;
    opacity: 0; animation: fade-up 0.9s ease forwards 0.6s;
  }
  .hero-actions {
    margin-top: 2rem; display: flex; gap: 1rem;
    align-items: center; flex-wrap: wrap;
    opacity: 0; animation: fade-up 0.9s ease forwards 0.8s;
  }
  .btn-primary {
    background: var(--gold); color: var(--bg); border: none;
    padding: 0.8rem 1.8rem; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; border-radius: 2px; cursor: pointer;
    text-decoration: none; transition: box-shadow 0.2s, transform 0.2s;
    display: inline-block; position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.12);
    transform: translateX(-100%); transition: transform 0.3s;
  }
  .btn-primary:hover::after { transform: translateX(0); }
  .btn-primary:hover { box-shadow: 0 0 28px rgba(200,147,42,0.45); transform: translateY(-1px); }

  .btn-ghost {
    background: transparent; color: var(--text); border: none;
    padding: 0.8rem 0; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 400; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
    gap: 0.5rem; transition: color 0.2s, gap 0.2s;
  }
  .btn-ghost:hover { color: var(--gold); gap: 0.8rem; }

  .hero-stats {
    margin-top: 3rem; display: flex; gap: 2.5rem; flex-wrap: wrap;
    opacity: 0; animation: fade-up 0.9s ease forwards 1s;
  }
  .stat-num {
    font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700;
    color: var(--gold); line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.2rem;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* MARQUEE */
  .marquee-wrap {
    overflow: hidden;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: rgba(200,147,42,0.03); padding: 0.85rem 0;
    position: relative; z-index: 2;
  }
  .marquee-track {
    display: flex; gap: 2.5rem;
    animation: marquee 22s linear infinite;
    white-space: nowrap; width: max-content;
  }
  .marquee-item {
    font-family: 'Space Mono', monospace; font-size: 0.72rem;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; align-items: center; gap: 0.8rem;
  }
  .marquee-item::before { content: '◆'; color: var(--gold); font-size: 0.45rem; }
  @keyframes marquee {
    from { transform: translateX(0); } to { transform: translateX(-50%); }
  }

  /* SECTIONS */
  section { padding: 6rem 8%; position: relative; z-index: 2; }

  .section-label {
    font-family: 'Space Mono', monospace; font-size: 0.68rem;
    color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem;
  }
  .section-label::before { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); }
  .section-title {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    line-height: 1.15; letter-spacing: -0.02em; max-width: 560px;
  }

  /* SERVICES */
  .services-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 1px; margin-top: 3rem; border: 1px solid var(--border);
  }
  .service-card {
    background: var(--card); padding: 2rem 1.6rem;
    border: 1px solid var(--border);
    position: relative; overflow: hidden; transition: background 0.3s;
  }
  .service-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: scaleX(0); transition: transform 0.4s;
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover { background: rgba(26,31,58,0.95); }
  .service-icon {
    width: 44px; height: 44px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.2rem; font-size: 1.2rem;
    background: rgba(200,147,42,0.06);
    transition: background 0.3s, border-color 0.3s;
  }
  .service-card:hover .service-icon { background: rgba(200,147,42,0.15); border-color: var(--gold); }
  .service-num {
    font-family: 'Space Mono', monospace; font-size: 0.62rem;
    color: var(--gold); letter-spacing: 0.12em; margin-bottom: 0.6rem; opacity: 0.6;
  }
  .service-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 0.65rem; }
  .service-desc { color: var(--muted); font-size: 0.84rem; line-height: 1.7; }
  .service-tag {
    display: inline-block; margin-top: 1rem;
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6;
  }

  /* ABOUT */
  .about-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .about-visual { position: relative; height: 400px; }
  .about-box {
    position: absolute; border: 1px solid var(--border);
    background: var(--card); padding: 1.8rem; backdrop-filter: blur(12px);
  }
  .about-box.main {
    top: 0; left: 0; right: 50px; bottom: 50px;
    display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden;
  }
  .about-box.main::before {
    content: 'VEDAIQ'; position: absolute; top: -5px; left: -5px;
    font-family: 'Syne', sans-serif; font-size: 8rem; font-weight: 800;
    color: rgba(200,147,42,0.04); white-space: nowrap; letter-spacing: -0.05em;
  }
  .about-box.accent {
    bottom: 0; right: 0; width: 175px;
    background: rgba(200,147,42,0.08); border-color: var(--gold);
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .big-num { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--gold); line-height: 1; }
  .about-text { font-size: 0.88rem; color: var(--muted); line-height: 1.75; }
  .pillar-list { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; }
  .pillar {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem; border: 1px solid transparent;
    transition: border-color 0.3s, background 0.3s; border-radius: 2px;
  }
  .pillar:hover { border-color: var(--border); background: rgba(200,147,42,0.03); }
  .pillar-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    background: rgba(200,147,42,0.08); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  .pillar-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .pillar-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

  /* PROCESS */
  .process-section { background: var(--bg2); }
  .process-grid {
    margin-top: 3.5rem; display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 0; position: relative;
  }
  .process-grid::before {
    content: ''; position: absolute; top: 36px; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), var(--gold), var(--border), transparent);
  }
  .process-step { padding: 0 0.8rem; text-align: center; }
  .step-circle {
    width: 72px; height: 72px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.2rem;
    font-family: 'Space Mono', monospace; font-size: 0.75rem;
    color: var(--gold); font-weight: 700; position: relative; z-index: 1;
    transition: border-color 0.3s, background 0.3s;
  }
  .process-step:hover .step-circle {
    border-color: var(--gold); background: rgba(200,147,42,0.08);
    box-shadow: 0 0 20px var(--gold-glow);
  }
  .step-title { font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700; margin-bottom: 0.4rem; }
  .step-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.55; }

  /* TECH */
  .tech-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 1px; margin-top: 2.5rem; border: 1px solid var(--border);
  }
  .tech-item {
    border: 1px solid var(--border); padding: 1.2rem 0.8rem;
    text-align: center; transition: background 0.2s;
  }
  .tech-item:hover { background: rgba(200,147,42,0.06); }
  .tech-name { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); transition: color 0.2s; }
  .tech-item:hover .tech-name { color: var(--gold); }
  .tech-emoji { font-size: 1.3rem; margin-bottom: 0.4rem; display: block; }

  /* CTA */
  .cta-section {
    background: linear-gradient(135deg, var(--bg2) 0%, rgba(200,147,42,0.04) 100%);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    text-align: center; position: relative; overflow: hidden;
  }
  .cta-section::before {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 500px; height: 250px;
    background: radial-gradient(ellipse, rgba(200,147,42,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .cta-section h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.7rem, 4.5vw, 3.4rem);
    font-weight: 800; line-height: 1.15; letter-spacing: -0.02em;
    max-width: 620px; margin: 0 auto;
  }
  .cta-section p {
    color: var(--muted); max-width: 420px;
    margin: 1.2rem auto 2.2rem; line-height: 1.75; font-size: 0.93rem;
  }
  .cta-actions { display: flex; align-items: center; justify-content: center; gap: 1.2rem; flex-wrap: wrap; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 0.8rem 1.8rem; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; border-radius: 2px; cursor: pointer;
    text-decoration: none; transition: border-color 0.2s, color 0.2s; display: inline-block;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* FOOTER */
  footer {
    padding: 2.5rem 8%; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 1rem; position: relative; z-index: 2;
  }
  .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); }
  .footer-logo span { color: var(--gold); }
  .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; }
  .footer-links { display: flex; gap: 1.5rem; list-style: none; }
  .footer-links a { font-size: 0.78rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--gold); }

  /* SCROLL REVEAL */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ══════════════════════════
     MOBILE
  ══════════════════════════ */
  @media (max-width: 768px) {
    nav { padding: 1rem 5%; }
    .nav-links, .nav-cta { display: none; }
    .hamburger { display: flex; }

    .hero { padding: 5.5rem 6% 3.5rem; min-height: 100vh; }
    .hero-ring { display: none; }
    .orb1 { width: 250px; height: 250px; top: -30px; right: -50px; }
    .orb2 { width: 180px; height: 180px; }
    .orb3 { display: none; }

    .hero h1 { font-size: clamp(2.2rem, 9vw, 3rem); line-height: 1.1; max-width: 100%; }
    .hero-sub { font-size: 0.88rem; max-width: 100%; margin-top: 1rem;
